name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Core
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          path: adamant-modpack-Core

      - name: Checkout Lib (test dependency)
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          repository: h2-modpack/h2-modpack-Lib
          path: adamant-modpack-Lib

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Install LuaUnit
        run: |
          sudo mkdir -p /usr/local/share/lua/5.1
          curl -sL https://raw.githubusercontent.com/bluebird75/luaunit/master/luaunit.lua | sudo tee /usr/local/share/lua/5.1/luaunit.lua > /dev/null

      - name: Run tests
        working-directory: adamant-modpack-Core
        run: lua5.1 tests/all.lua
