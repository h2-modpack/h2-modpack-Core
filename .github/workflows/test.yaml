name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Core
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          path: adamant-modpack-Core

      - name: Checkout Lib (test dependency)
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          repository: h2-modpack/h2-modpack-Lib
          path: adamant-modpack-Lib

      - name: Install Lua 5.1 & Luarocks
        run: sudo apt-get install -y lua5.1 luarocks

      - name: Install LuaUnit
        run: sudo luarocks install luaunit

      - name: Run tests
        working-directory: adamant-modpack-Core
        run: lua5.1 tests/all.lua
