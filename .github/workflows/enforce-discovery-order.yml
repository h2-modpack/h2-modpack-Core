name: Enforce Append-Only Registry

on:
  pull_request:
    paths:
      - 'src/discovery_registry.lua'

jobs:
  verify-append-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Checkout main branch (for comparison)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_branch

      - name: Verify Sequence Integrity
        run: |
          OLD_REG="main_branch/src/discovery_registry.lua"
          NEW_REG="src/discovery_registry.lua"

          # 1. Extract just the ordered module name lines from the old, approved registry
          grep '"adamant-' "$OLD_REG" > old_sequence.txt

          # 2. Count exactly how many modules were in the old sequence
          OLD_COUNT=$(wc -l < old_sequence.txt)

          # 3. Extract the exact same number of mod lines from the top of the NEW registry
          grep '"adamant-' "$NEW_REG" | head -n $OLD_COUNT > new_sequence_top.txt
          
          # 4. Compare them. If they aren't completely identical, the sequence was broken!
          if ! cmp -s old_sequence.txt new_sequence_top.txt; then
            echo "❌ ERROR: Historical sequence altered!"
            echo "You modified, deleted, or reordered existing entries in discovery_registry.lua."
            echo "To preserve hash integrity, you may only APPEND new modules to the bottom."
            exit 1
          fi
          
          echo "✅ Registry verified: Append-only rule maintained."